<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Search App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>💼 Job Search App</h1>
    <p>Find real job listings from around the world</p>
    <div class="search-bar">
      <input type="text" id="jobInput" placeholder="Job title e.g. Python Developer" />
      <input type="text" id="locationInput" placeholder="Location e.g. New York or Remote" />
      <button onclick="searchJobs()">Search</button>
    </div>
    <div class="filters">
      <label>Sort by:
        <select id="sortBy" onchange="renderJobs()">
          <option value="date">Most Recent</option>
          <option value="title">Job Title (A-Z)</option>
          <option value="company">Company (A-Z)</option>
        </select>
      </label>
      <input type="text" id="filterInput" placeholder="Filter results..." oninput="renderJobs()" />
    </div>
    <div id="error" class="error"></div>
    <div id="loading" class="loading" style="display:none">⏳ Searching jobs...</div>
    <div id="results"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
